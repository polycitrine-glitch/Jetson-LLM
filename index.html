<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jetson Chat Demo</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: Arial, sans-serif;
      background: #f7f7fb;
      color: #111;
    }

    body {
      display: flex;
      flex-direction: column;
    }

    .page {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    .header {
      max-width: 800px;
      width: 100%;
      margin: 0 auto;
      padding: 24px 16px 12px 16px;
      background: #f7f7fb;
    }

    h1 {
      margin: 0 0 8px 0;
    }

    p {
      margin: 0;
      color: #444;
    }

    #chat-wrap {
      flex: 1;
      overflow-y: auto;
      padding: 12px 0 140px 0;
      scroll-behavior: smooth;
    }

    #chat {
      max-width: 800px;
      margin: 0 auto;
      padding: 0 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .message {
      max-width: 75%;
      padding: 12px 14px;
      border-radius: 14px;
      white-space: pre-wrap;
      word-break: break-word;
      line-height: 1.4;
    }

    .user {
      align-self: flex-end;
      background: #111;
      color: white;
      border-bottom-right-radius: 4px;
    }

    .bot {
      align-self: flex-start;
      background: #ececf3;
      color: #111;
      border-bottom-left-radius: 4px;
    }

    .system {
      align-self: center;
      background: #fff8d6;
      color: #444;
      font-size: 14px;
      border: 1px solid #eadf9b;
      max-width: 90%;
    }

    .composer-shell {
      position: sticky;
      bottom: 0;
      width: 100%;
      background: linear-gradient(to top, #f7f7fb 75%, rgba(247, 247, 251, 0));
      padding: 12px 0 16px 0;
    }

    .composer {
      max-width: 800px;
      margin: 0 auto;
      padding: 0 16px;
    }

    .composer-box {
      background: white;
      border: 1px solid #ddd;
      border-radius: 18px;
      padding: 12px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
    }

    .input-row {
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    textarea {
      flex: 1;
      min-height: 56px;
      max-height: 180px;
      padding: 12px;
      font-size: 16px;
      border: 1px solid #bbb;
      border-radius: 12px;
      resize: vertical;
      font-family: inherit;
    }

    button {
      padding: 12px 18px;
      font-size: 16px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      background: #111;
      color: white;
      flex-shrink: 0;
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .status {
      margin-top: 10px;
      color: #555;
      font-size: 14px;
      padding-left: 2px;
    }

    @media (max-width: 700px) {
      .message {
        max-width: 88%;
      }

      .input-row {
        flex-direction: column;
        align-items: stretch;
      }

      button {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="header">
      <h1>Jetson Chat Demo</h1>
      <p>This version talks to DeepSeek running locally on your Mac through Ollama.</p>
    </div>

    <div id="chat-wrap">
      <div id="chat">
        <div class="message system">Chat ready. Send a message to test your Mac running DeepSeek locally.</div>
      </div>
    </div>

    <div class="composer-shell">
      <div class="composer">
        <div class="composer-box">
          <div class="input-row">
            <textarea id="prompt" placeholder="Type a message here..."></textarea>
            <button id="sendBtn">Send</button>
          </div>
          <div class="status" id="status">Status: Idle</div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const chatWrap = document.getElementById("chat-wrap");
    const chat = document.getElementById("chat");
    const sendBtn = document.getElementById("sendBtn");
    const promptBox = document.getElementById("prompt");
    const statusBox = document.getElementById("status");

    function isNearBottom() {
      const threshold = 120;
      return chatWrap.scrollHeight - chatWrap.scrollTop - chatWrap.clientHeight < threshold;
    }

    function scrollToBottom(force = false) {
      if (force || isNearBottom()) {
        chatWrap.scrollTop = chatWrap.scrollHeight;
      }
    }

    function addMessage(text, type) {
      const shouldStick = isNearBottom();

      const msg = document.createElement("div");
      msg.className = `message ${type}`;
      msg.textContent = text;
      chat.appendChild(msg);

      if (shouldStick) {
        scrollToBottom(true);
      }
    }

    async function sendMessage() {
      const prompt = promptBox.value.trim();

      if (!prompt) {
        statusBox.textContent = "Status: Please type a message first.";
        return;
      }

      addMessage(prompt, "user");
      promptBox.value = "";
      sendBtn.disabled = true;
      statusBox.textContent = "Status: Sending request...";

      scrollToBottom(true);

      try {
        const res = await fetch("http://127.0.0.1:11434/api/generate", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            model: "deepseek-r1:1.5b",
            prompt: prompt,
            stream: false
          })
        });

        const data = await res.json();

        addMessage(
          data?.response ?? "No response came back from Ollama.",
          "bot"
        );

        statusBox.textContent = `Status: Success (${res.status})`;
      } catch (err) {
        addMessage("Request failed: " + String(err), "bot");
        statusBox.textContent = "Status: Request failed.";
      } finally {
        sendBtn.disabled = false;
        promptBox.focus();
      }
    }

    sendBtn.addEventListener("click", sendMessage);

    promptBox.addEventListener("keydown", (event) => {
      if (event.key === "Enter" && !event.shiftKey) {
        event.preventDefault();
        sendMessage();
      }
    });

    window.addEventListener("load", () => {
      scrollToBottom(true);
    });
  </script>
</body>
</html>
