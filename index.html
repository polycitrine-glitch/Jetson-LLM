<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jetson Chat Demo</title>
  <style>
    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: Arial, sans-serif;
      background: #f7f7fb;
      color: #111;
    }

    body {
      display: flex;
      flex-direction: column;
    }

    .page {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    .header {
      max-width: 800px;
      width: 100%;
      margin: 0 auto;
      padding: 24px 16px 12px;
      background: #f7f7fb;
    }

    h1 { margin: 0 0 8px 0; }
    p { margin: 0; color: #444; }

    #loginBox {
      max-width: 800px;
      margin: 12px auto;
      padding: 0 16px;
    }

    .login-card {
      background: white;
      border: 1px solid #ddd;
      border-radius: 18px;
      padding: 14px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.06);
    }

    .login-row {
      display: flex;
      gap: 10px;
    }

    input {
      flex: 1;
      padding: 12px;
      font-size: 16px;
      border: 1px solid #bbb;
      border-radius: 12px;
      font-family: inherit;
    }

    #chat-wrap {
      flex: 1;
      overflow-y: auto;
      padding: 12px 0 140px 0;
      scroll-behavior: smooth;
    }

    #chat {
      max-width: 800px;
      margin: 0 auto;
      padding: 0 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .message-wrap {
      display: flex;
      flex-direction: column;
      gap: 4px;
      max-width: 75%;
    }

    .user-wrap { align-self: flex-end; }
    .bot-wrap { align-self: flex-start; }
    .system-wrap {
      align-self: center;
      max-width: 90%;
    }

    .message {
      padding: 12px 14px;
      border-radius: 14px;
      white-space: pre-wrap;
      word-break: break-word;
      line-height: 1.4;
    }

    .user {
      background: #111;
      color: white;
      border-bottom-right-radius: 4px;
    }

    .bot {
      background: #ececf3;
      color: #111;
      border-bottom-left-radius: 4px;
    }

    .system {
      background: #fff8d6;
      color: #444;
      font-size: 14px;
      border: 1px solid #eadf9b;
    }

    .message-note {
      font-size: 12px;
      color: #888;
      padding: 0 4px;
    }

    .composer-shell {
      position: sticky;
      bottom: 0;
      width: 100%;
      background: linear-gradient(to top, #f7f7fb 75%, rgba(247, 247, 251, 0));
      padding: 12px 0 16px;
    }

    .composer {
      max-width: 800px;
      margin: 0 auto;
      padding: 0 16px;
    }

    .composer-box {
      background: white;
      border: 1px solid #ddd;
      border-radius: 18px;
      padding: 12px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
    }

    .input-row {
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    textarea {
      flex: 1;
      min-height: 56px;
      max-height: 180px;
      padding: 12px;
      font-size: 16px;
      border: 1px solid #bbb;
      border-radius: 12px;
      resize: vertical;
      font-family: inherit;
    }

    button {
      padding: 12px 18px;
      font-size: 16px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      background: #111;
      color: white;
      flex-shrink: 0;
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .secondary-btn {
      background: #ddd;
      color: #111;
      font-size: 14px;
      padding: 8px 12px;
    }

    .status-row {
      margin-top: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }

    .status {
      color: #555;
      font-size: 14px;
      padding-left: 2px;
    }

    @media (max-width: 700px) {
      .message-wrap { max-width: 88%; }

      .input-row, .login-row {
        flex-direction: column;
        align-items: stretch;
      }

      button { width: 100%; }

      .status-row {
        flex-direction: column;
        align-items: stretch;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="header">
      <h1>Jetson Chat Demo</h1>
      <p>This site talks to Llama 3.1 8B running on your Jetson through a password-protected proxy.</p>
    </div>

    <div id="loginBox">
      <div class="login-card">
        <div class="login-row">
          <input id="passwordInput" type="password" placeholder="Enter Jetson password..." />
          <button id="loginBtn">Unlock</button>
        </div>
        <div class="status" id="loginStatus">Not logged in.</div>
      </div>
    </div>

    <div id="chat-wrap">
      <div id="chat"></div>
    </div>

    <div class="composer-shell">
      <div class="composer">
        <div class="composer-box">
          <div class="input-row">
            <textarea id="prompt" placeholder="Type a message here..." disabled></textarea>
            <button id="sendBtn" disabled>Send</button>
          </div>

          <div class="status-row">
            <div class="status" id="status">Status: Locked</div>
            <button class="secondary-btn" id="clearBtn" type="button">Clear Chat</button>
            <button class="secondary-btn" id="logoutBtn" type="button">Logout</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const API_BASE = "https://forbes-truly-lease-school.trycloudflare.com";
    const MODEL = "llama3.1:8b";

    const chatWrap = document.getElementById("chat-wrap");
    const chat = document.getElementById("chat");
    const sendBtn = document.getElementById("sendBtn");
    const clearBtn = document.getElementById("clearBtn");
    const logoutBtn = document.getElementById("logoutBtn");
    const promptBox = document.getElementById("prompt");
    const statusBox = document.getElementById("status");

    const passwordInput = document.getElementById("passwordInput");
    const loginBtn = document.getElementById("loginBtn");
    const loginStatus = document.getElementById("loginStatus");

    const systemPrompt =
      "You are a helpful chatbot running locally on a Jetson. " +
      "Always reply in English. Use plain text only. Be concise and natural.";

    const conversationHistory = [];

    function getToken() {
      return localStorage.getItem("jetson_token") || "";
    }

    function setToken(token) {
      localStorage.setItem("jetson_token", token);
    }

    function clearToken() {
      localStorage.removeItem("jetson_token");
    }

    function setUnlocked(isUnlocked) {
      promptBox.disabled = !isUnlocked;
      sendBtn.disabled = !isUnlocked;

      if (isUnlocked) {
        loginStatus.textContent = "Logged in.";
        statusBox.textContent = "Status: Ready";
        promptBox.focus();
      } else {
        loginStatus.textContent = "Not logged in.";
        statusBox.textContent = "Status: Locked";
      }
    }

    function isNearBottom() {
      const threshold = 120;
      return chatWrap.scrollHeight - chatWrap.scrollTop - chatWrap.clientHeight < threshold;
    }

    function scrollToBottom(force = false) {
      if (force || isNearBottom()) {
        chatWrap.scrollTop = chatWrap.scrollHeight;
      }
    }

    function addMessage(text, type, note = "") {
      const shouldStick = isNearBottom();

      const wrap = document.createElement("div");
      wrap.className = `message-wrap ${type}-wrap`;

      const msg = document.createElement("div");
      msg.className = `message ${type}`;
      msg.textContent = text;
      wrap.appendChild(msg);

      if (note) {
        const noteEl = document.createElement("div");
        noteEl.className = "message-note";
        noteEl.textContent = note;
        wrap.appendChild(noteEl);
      }

      chat.appendChild(wrap);

      if (shouldStick) scrollToBottom(true);
    }

    function clearChat() {
      chat.innerHTML = "";
      conversationHistory.length = 0;
      addMessage("Chat cleared.", "system");
      addMessage("Chat ready. This is using your Jetson through the secure proxy.", "system");
      statusBox.textContent = getToken() ? "Status: Ready" : "Status: Locked";
      promptBox.focus();
    }

    async function login() {
      const password = passwordInput.value.trim();

      if (!password) {
        loginStatus.textContent = "Enter the password first.";
        return;
      }

      loginBtn.disabled = true;
      loginStatus.textContent = "Checking password...";

      try {
        const res = await fetch(`${API_BASE}/login`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ password })
        });

        const data = await res.json();

        if (!res.ok || !data.ok || !data.token) {
          loginStatus.textContent = data.error || "Login failed.";
          clearToken();
          setUnlocked(false);
          return;
        }

        setToken(data.token);
        passwordInput.value = "";
        setUnlocked(true);
        addMessage("Unlocked Jetson access for this browser.", "system");
      } catch (err) {
        loginStatus.textContent = "Login request failed: " + String(err);
        clearToken();
        setUnlocked(false);
      } finally {
        loginBtn.disabled = false;
      }
    }

    async function sendMessage() {
      const token = getToken();

      if (!token) {
        statusBox.textContent = "Status: Log in first.";
        setUnlocked(false);
        return;
      }

      const prompt = promptBox.value.trim();

      if (!prompt) {
        statusBox.textContent = "Status: Please type a message first.";
        return;
      }

      addMessage(prompt, "user");
      conversationHistory.push({
        role: "user",
        content: prompt
      });

      promptBox.value = "";
      sendBtn.disabled = true;
      statusBox.textContent = "Status: Thinking...";
      scrollToBottom(true);

      try {
        const res = await fetch(`${API_BASE}/chat`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Authorization": `Bearer ${token}`
          },
          body: JSON.stringify({
            model: MODEL,
            stream: false,
            messages: [
              {
                role: "system",
                content: systemPrompt
              },
              ...conversationHistory
            ]
          })
        });

        const data = await res.json();

        if (res.status === 401 || res.status === 403) {
          clearToken();
          setUnlocked(false);
          addMessage("Session expired or token rejected. Log in again.", "system");
          return;
        }

        if (!res.ok) {
          addMessage("Request failed: " + JSON.stringify(data), "bot");
          statusBox.textContent = `Status: Error (${res.status})`;
          return;
        }

        const rawReply = data?.message?.content ?? "";
        const reply = rawReply.trim() || "(No answer)";

        addMessage(reply, "bot");
        conversationHistory.push({
          role: "assistant",
          content: reply
        });

        statusBox.textContent = `Status: Success (${res.status})`;
      } catch (err) {
        addMessage("Request failed: " + String(err), "bot");
        statusBox.textContent = "Status: Request failed.";
      } finally {
        sendBtn.disabled = !getToken();
        promptBox.focus();
      }
    }

    function logout() {
      clearToken();
      setUnlocked(false);
      addMessage("Logged out from Jetson access.", "system");
    }

    loginBtn.addEventListener("click", login);
    sendBtn.addEventListener("click", sendMessage);
    clearBtn.addEventListener("click", clearChat);
    logoutBtn.addEventListener("click", logout);

    passwordInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter") login();
    });

    promptBox.addEventListener("keydown", (event) => {
      if (event.key === "Enter" && !event.shiftKey) {
        event.preventDefault();
        sendMessage();
      }
    });

    window.addEventListener("load", () => {
      clearChat();
      setUnlocked(Boolean(getToken()));
      scrollToBottom(true);
    });
  </script>
</body>
</html>
