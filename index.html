<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jetson Chat Demo</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 800px;
      margin: 40px auto;
      padding: 0 16px;
      background: #f7f7fb;
      color: #111;
    }

    h1 {
      margin-bottom: 8px;
    }

    p {
      color: #444;
      margin-bottom: 20px;
    }

    #chat {
      background: white;
      border: 1px solid #ddd;
      border-radius: 14px;
      padding: 16px;
      min-height: 300px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .message {
      max-width: 75%;
      padding: 12px 14px;
      border-radius: 14px;
      white-space: pre-wrap;
      word-break: break-word;
      line-height: 1.4;
    }

    .user {
      align-self: flex-end;
      background: #111;
      color: white;
      border-bottom-right-radius: 4px;
    }

    .bot {
      align-self: flex-start;
      background: #ececf3;
      color: #111;
      border-bottom-left-radius: 4px;
    }

    .system {
      align-self: center;
      background: #fff8d6;
      color: #444;
      font-size: 14px;
      border: 1px solid #eadf9b;
    }

    .input-row {
      display: flex;
      gap: 10px;
      margin-top: 16px;
    }

    textarea {
      flex: 1;
      min-height: 70px;
      max-height: 180px;
      padding: 12px;
      font-size: 16px;
      border: 1px solid #bbb;
      border-radius: 12px;
      box-sizing: border-box;
      resize: vertical;
    }

    button {
      padding: 12px 18px;
      font-size: 16px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      background: #111;
      color: white;
      align-self: flex-end;
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .status {
      margin-top: 12px;
      color: #555;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <h1>Jetson Chat Demo</h1>
  <p>This version uses a demo API. Later, we’ll swap in the Jetson as the real backend.</p>

  <div id="chat">
    <div class="message system">Chat ready. Send a message to test the website-to-API flow.</div>
  </div>

  <div class="input-row">
    <textarea id="prompt" placeholder="Type a message here..."></textarea>
    <button id="sendBtn">Send</button>
  </div>

  <div class="status" id="status">Status: Idle</div>

  <script>
    const chat = document.getElementById("chat");
    const sendBtn = document.getElementById("sendBtn");
    const promptBox = document.getElementById("prompt");
    const statusBox = document.getElementById("status");

    function addMessage(text, type) {
      const msg = document.createElement("div");
      msg.className = `message ${type}`;
      msg.textContent = text;
      chat.appendChild(msg);
      chat.scrollTop = chat.scrollHeight;
    }

    async function sendMessage() {
      const prompt = promptBox.value.trim();

      if (!prompt) {
        statusBox.textContent = "Status: Please type a message first.";
        return;
      }

      addMessage(prompt, "user");
      promptBox.value = "";
      sendBtn.disabled = true;
      statusBox.textContent = "Status: Sending request...";

      try {
        const res = await fetch("https://echo.free.beeceptor.com/chat-demo", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            message: prompt,
            source: "github-pages-demo"
          })
        });

        const data = await res.json();

        const echoedMessage =
          data?.parsedBody?.message ??
          data?.message ??
          "No echoed message field found.";

        addMessage(
          "Demo API received: " + echoedMessage + "\n\nThis is where the Jetson reply will go later.",
          "bot"
        );

        statusBox.textContent = `Status: Success (${res.status})`;
      } catch (err) {
        addMessage("Request failed: " + String(err), "bot");
        statusBox.textContent = "Status: Request failed.";
      } finally {
        sendBtn.disabled = false;
      }
    }

    sendBtn.addEventListener("click", sendMessage);

    promptBox.addEventListener("keydown", (event) => {
      if (event.key === "Enter" && !event.shiftKey) {
        event.preventDefault();
        sendMessage();
      }
    });
  </script>
</body>
</html>
